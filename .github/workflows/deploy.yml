name: Build and Deploy Frontend Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fitness-frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define frontend image name
        id: image
        run: echo "name=ghcr.io/${{ github.repository_owner }}/fitness-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy:
    needs: frontend
    runs-on: ubuntu-latest
    env:
      FRONTEND_IMAGE: ${{ needs.frontend.outputs.image_name }}@${{ needs.frontend.outputs.image_digest }}
    steps:
      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Test SSH connection
        run: |
          ssh -T -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "echo SSH connection successful"

      - name: Log in to GHCR on server
        run: |
          ssh -T -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} << EOF
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          EOF

      - name: Pull frontend image with retry
        run: |
          ssh -T -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "FRONTEND_IMAGE='${FRONTEND_IMAGE}' bash -se" << 'EOF'
            set -e
            image="$FRONTEND_IMAGE"

            if [ -z "$image" ]; then
              echo "FRONTEND_IMAGE is empty"
              exit 1
            fi

            for attempt in 1 2 3; do
              echo "Pull attempt ${attempt} for ${image}"

              if docker pull "${image}"; then
                echo "Successfully pulled ${image}"
                exit 0
              fi

              if [ "${attempt}" -lt 3 ]; then
                echo "Pull failed, retrying in 15 seconds..."
                sleep 15
              fi
            done

            echo "Failed to pull ${image} after 3 attempts"
            exit 1
          EOF

      - name: Deploy Frontend to Server
        run: |
          ssh -T -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "FRONTEND_IMAGE='${FRONTEND_IMAGE}' bash -se" << 'EOF'
            set -e
            cd /root

            printf '%s\n' \
              'services:' \
              '  frontend:' \
              "    image: ${FRONTEND_IMAGE}" \
              > docker-compose.prod.frontend-ghcr.override.yml

            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.prod.frontend-ghcr.override.yml \
              up -d --force-recreate frontend
          EOF
